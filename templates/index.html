<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Tepsi - Pro Kasa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- GENEL AYARLAR --- */
        :root {
            --font-main: 'Inter', sans-serif;
            --color-price: #198754; 
            --color-cal: #0d6efd;   
            --bg-body: #f4f7f6;     
            --box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.08); 
        }

        body { 
            background-color: var(--bg-body); 
            font-family: var(--font-main);
            color: #333;
        }

        /* --- SOL TARAF: KAMERA KUTUSU --- */
        .camera-container {
            background: #fff;
            padding: 1rem;
            border-radius: 16px;
            box-shadow: var(--box-shadow);
        }
        .camera-box { 
            border-radius: 12px; 
            overflow: hidden; 
            background: black;
            position: relative;
            aspect-ratio: 4/3; 
        }
        .camera-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .live-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-dot {
            height: 10px; width: 10px; background: white; border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* --- SAĞ TARAF: ADİSYON KUTUSU --- */
        .bill-box { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: var(--box-shadow); 
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .bill-header {
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
            margin-bottom: 20px;
            font-weight: 700;
            color: #2c3e50;
        }

        /* Tablo Stilleri */
        .table-hover tbody tr:hover { background-color: #f8f9fa; }
        .item-name { font-weight: 600; color: #2c3e50; }
        .item-qty { background: #eee; padding: 2px 8px; border-radius: 10px; font-size: 0.9em; font-weight: 700; color: #555; }
        
        /* Toplam Bölümü Stilleri */
        .total-section {
            background-color: #f8fbfc; 
            border-radius: 12px;
            padding: 25px;
            margin-top: auto; 
            border: 1px solid #eef2f7;
        }
        
        .price-tag { 
            color: var(--color-price); 
            font-weight: 800; 
            font-size: 2.2em; 
            letter-spacing: -1px;
        }
        .cal-tag { 
            color: var(--color-cal); 
            font-weight: 700; 
            font-size: 1.6em; 
        }
        .total-label { font-weight: 600; color: #7f8c8d; font-size: 1.1em; }

        /* --- MODAL (ONAY EKRANI) --- */
        .modal-content { border-radius: 16px; border: none; box-shadow: var(--box-shadow); }
        .modal-header { border-bottom: none; padding-bottom: 0; }
        .modal-body { padding: 2rem; }
        .success-icon-box {
            width: 80px; height: 80px; background: #d1e7dd; color: var(--color-price);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px auto;
        }
        .receipt-box {
            background-color: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
            border: 1px solid #eee;
        }
        .modal-footer { border-top: none; padding: 1.5rem; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-end mb-2">
    <a href="/admin" class="btn btn-outline-secondary btn-sm"><i class="fas fa-user-shield me-1"></i> Yönetici Paneli</a>
</div>
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="camera-container">
                <div class="camera-box">
                    <div class="live-badge"><div class="live-dot"></div> Canlı Analiz</div>
                    <img src="{{ url_for('video_feed') }}" alt="Kamera Akışı">
                </div>
                <div class="mt-3 text-center text-muted fw-medium">
                    <i class="fas fa-info-circle me-2"></i>Lütfen ürünleri tepsiye yerleştirin.
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="bill-box">
                <h4 class="bill-header"><i class="fas fa-receipt me-2"></i>Sipariş Özeti</h4>
                
                <div class="table-responsive flex-grow-1">
                    <table class="table table-hover align-middle">
                        <thead class="table-light small text-muted">
                            <tr>
                                <th>ÜRÜN</th>
                                <th class="text-center">ADET</th>
                                <th class="text-end">KALORİ</th>
                                <th class="text-end">TUTAR</th>
                            </tr>
                        </thead>
                        <tbody id="bill-body">
                            </tbody>
                    </table>
                </div>

                <div class="total-section">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="total-label"><i class="fas fa-fire-alt me-2 text-primary"></i>Toplam Enerji:</span>
                        <span id="total-cal" class="cal-tag">0 kcal</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="total-label"><i class="fas fa-wallet me-2 text-success"></i>Ödenecek Tutar:</span>
                        <span id="total-price" class="price-tag">0,00 TL</span>
                    </div>

                    <button onclick="finishOrder()" class="btn btn-success w-100 mt-4 btn-lg py-3 fw-bold shadow-sm">
                        <i class="fas fa-check-circle me-2"></i> SİPARİŞİ ONAYLA
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        </div>
      <div class="modal-body text-center">
        
        <div class="success-icon-box mb-3">
            <i class="fas fa-check fa-3x"></i>
        </div>
        <h3 class="fw-bold">Sipariş Tamamlandı!</h3>
        <p class="text-muted">Ödemeniz başarıyla alındı. Afiyet olsun.</p>
        
        <div class="receipt-box text-start">
            <h6 class="fw-bold mb-3 border-bottom pb-2">Ödeme Detayı</h6>
            <table class="table table-sm table-borderless mb-0 align-middle">
                <tbody id="modal-receipt-body">
                    </tbody>
                <tfoot style="border-top: 2px solid #eee;">
                    <tr>
                        <td class="pt-3"><span class="fw-bold text-muted">TOPLAM KALORİ</span></td>
                        <td class="text-end pt-3"><span id="modal-cal" class="fw-bold" style="color: var(--color-cal)">0 kcal</span></td>
                    </tr>
                    <tr>
                        <td class="pt-1"><span class="fw-bold text-dark" style="font-size: 1.1em;">GENEL TOPLAM</span></td>
                        <td class="text-end pt-1"><span id="modal-price" class="fw-bold" style="color: var(--color-price); font-size: 1.3em;">0 TL</span></td>
                    </tr>
                </tfoot>
            </table>
        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary w-100 py-3 fw-bold rounded-pill" onclick="resetOrder()">
            <i class="fas fa-user-plus me-2"></i> YENİ MÜŞTERİ AL
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let isFrozen = false; 
    let paymentModal;
    let currentData = null;

    document.addEventListener('DOMContentLoaded', function() {
        paymentModal = new bootstrap.Modal(document.getElementById('paymentModal'), {
            keyboard: false
        });
    });

    setInterval(() => {
        if (!isFrozen) {
            fetch('/get_bill')
                .then(response => response.json())
                .then(data => {
                    currentData = data;
                    updateMainTable(data);
                });
        }
    }, 1000);

    function updateMainTable(data) {
        const tbody = document.getElementById("bill-body");
        tbody.innerHTML = ""; 

        data.items.forEach(item => {
            const row = `<tr>
                <td><span class="item-name">${item.name}</span></td>
                <td class="text-center"><span class="item-qty">x${item.quantity}</span></td>
                <td class="text-end text-muted fw-medium">${item.subtotal_cal} kcal</td>
                <td class="text-end fw-bold">${item.subtotal.toFixed(2)} TL</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById("total-price").innerText = data.total_price.toFixed(2) + " TL";
        document.getElementById("total-cal").innerText = data.total_cal + " kcal";
    }

    function finishOrder() {
        if (!currentData || currentData.items.length === 0) {
             const btn = document.querySelector('.btn-success');
             btn.classList.add('shake');
             setTimeout(()=> btn.classList.remove('shake'), 500);
            return;
        }

        isFrozen = true;

        // --- VERİTABANINA KAYDETME (AJAX) ---
        fetch('/save_order', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                items: currentData.items,
                total_price: currentData.total_price,
                total_cal: currentData.total_cal
            }),
        })
        .then(response => response.json())
        .then(data => {
            console.log("Sipariş Veritabanına Kaydedildi:", data);
        })
        .catch((error) => {
            console.error('Hata:', error);
        });
        
        // Modal Gösterimi
        const modalBody = document.getElementById("modal-receipt-body");
        modalBody.innerHTML = ""; 

        currentData.items.forEach(item => {
            const row = `<tr>
                <td>
                    <span class="fw-medium">${item.name}</span> 
                    <small class="text-muted ms-1">(x${item.quantity})</small>
                </td>
                <td class="text-end fw-bold">${item.subtotal.toFixed(2)} TL</td>
            </tr>`;
            modalBody.innerHTML += row;
        });

        document.getElementById("modal-price").innerText = document.getElementById("total-price").innerText;
        document.getElementById("modal-cal").innerText = document.getElementById("total-cal").innerText;
        
        paymentModal.show();
    }

    function resetOrder() {
        paymentModal.hide();
        isFrozen = false;
    }
</script>
<style>.shake{animation:shake .5s linear} @keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-5px)}20%,40%,60%,80%{transform:translateX(5px)}}</style>

</body>
</html>
